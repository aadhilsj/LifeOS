<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="116" fill="#0d1117"/>
  <rect width="512" height="512" rx="116" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.06"/>
  <!-- Outer ring track -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.05"/>
  <!-- Outer arc 300deg CW, gap lower-left -->
  <path d="M256,70 A186,186 0 1 1 95,349" fill="none" stroke="#c8392b" stroke-width="18" stroke-linecap="round"/>
  <!-- Inner ring track -->
  <circle cx="256" cy="256" r="134" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.04"/>
  <!-- Inner arc 240deg CW, gap lower-left -->
  <path d="M256,122 A134,134 0 1 1 122,256" fill="none" stroke="#c9a84c" stroke-width="12" stroke-linecap="round"/>
  <!-- K — sharp geometric, square linecaps, centred at 256,256 -->
  <!-- Vertical stem -->
  <line x1="221" y1="188" x2="221" y2="324" stroke="#f0efe8" stroke-width="20" stroke-linecap="square"/>
  <!-- Upper arm -->
  <line x1="221" y1="256" x2="299" y2="188" stroke="#f0efe8" stroke-width="20" stroke-linecap="square"/>
  <!-- Lower arm -->
  <line x1="221" y1="256" x2="299" y2="324" stroke="#f0efe8" stroke-width="20" stroke-linecap="square"/>
</svg>
